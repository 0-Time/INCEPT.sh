services:
  incept:
    build: .
    ports:
      - "8080:8080"
    environment:
      - INCEPT_HOST=0.0.0.0
      - INCEPT_PORT=8080
      - INCEPT_SAFE_MODE=true
      - INCEPT_LOG_LEVEL=info
      - INCEPT_API_KEY=${INCEPT_API_KEY:-}
      - INCEPT_RATE_LIMIT=${INCEPT_RATE_LIMIT:-60}
    volumes:
      - model-data:/app/models
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "2.0"
    restart: unless-stopped

volumes:
  model-data:
